<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conta Suspensa - EduGest</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.bloqueado-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--app-bg);
  padding: 20px;
}
.bloqueado-box {
  background: var(--projects-section);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 48px 32px;
  width: 100%;
  max-width: 480px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.icone-bloqueio {
  font-size: 72px;
  color: #dc2626;
  margin-bottom: 24px;
}
.bloqueado-box h1 {
  color: var(--main-color);
  font-size: 28px;
  margin: 0 0 12px 0;
}
.bloqueado-box p {
  color: var(--secondary-color);
  font-size: 16px;
  line-height: 1.6;
  margin: 0 0 24px 0;
}
.motivo-box {
  background: rgba(220,38,38,.1);
  border: 1px solid rgba(220,38,38,.3);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
}
.motivo-box strong {
  color: #dc2626;
  display: block;
  margin-bottom: 8px;
}
.btn-contato {
  display: inline-block;
  padding: 12px 24px;
  background: #25d366;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  margin: 8px;
  transition: .2s;
}
.btn-contato:hover {
  background: #1fa855;
  transform: translateY(-2px);
}
.btn-logout {
  display: inline-block;
  padding: 12px 24px;
  background: var(--search-area-bg);
  color: var(--main-color);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  margin: 8px;
  cursor: pointer;
}
.info-rodape {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border-color);
  font-size: 13px;
  color: var(--secondary-color);
}
</style>
</head>
<body>
<div class="bloqueado-container">
  <div class="bloqueado-box">
    <i class="fa-solid fa-ban icone-bloqueio"></i>
    <h1>Conta Suspensa</h1>
    <p>O acesso da tua escola ao EduGest foi temporariamente bloqueado.</p>
    
    <div class="motivo-box">
      <strong>Motivo:</strong>
      <span id="motivoBloqueio">Carregando...</span>
    </div>

    <p>Para reativar o acesso, regularize a situação com nossa equipe.</p>

    <a href="https://wa.me/244XXXXXXXXX?text=Olá,%20minha%20escola%20está%20bloqueada%20no%20EduGest.%20Preciso%20de%20ajuda." 
       class="btn-contato" 
       target="_blank">
      <i class="fa-brands fa-whatsapp"></i> Falar no WhatsApp
    </a>
    
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Sair
    </button>

    <div class="info-rodape">
      <i class="fa-solid fa-circle-info"></i> 
      Escola ID: <span id="escolaId">-</span><br>
      Se acha que isso é um erro, entre em contato.
    </div>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'index.html';
    return;
  }

  try {
    const userDoc = await getDoc(doc(db, 'usuarios', user.uid));
    if (!userDoc.exists()) {
      window.location.href = 'index.html';
      return;
    }

    const escolaId = userDoc.data().escolaId;
    document.getElementById('escolaId').textContent = escolaId;

    const escolaDoc = await getDoc(doc(db, 'escolas', escolaId));
    if (escolaDoc.exists()) {
      const dados = escolaDoc.data();
      const motivo = dados.motivoBloqueio || 'Inadimplência - Pagamento pendente';
      document.getElementById('motivoBloqueio').textContent = motivo;

      // Se escola foi reativada, volta pro app
      if (dados.ativo !== false) {
        window.location.href = 'dashboard.html';
      }
    }
  } catch (e) {
    console.error(e);
    document.getElementById('motivoBloqueio').textContent = 'Erro ao carregar informações';
  }
});

window.logout = async () => {
  await signOut(auth);
  window.location.href = 'index.html';
};
</script>
</body>
</html>
