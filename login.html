<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestEdu+ Login</title>
<link rel="stylesheet" href="styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="scripts/theme.js"></script>
<style>
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--app-bg)}
.login-box{background:var(--projects-section);border:1px solid var(--border-color);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{text-align:center;margin:0 0 8px 0;color:var(--main-color);font-size:24px}
.login-box p{text-align:center;margin:0 0 24px 0;color:var(--secondary-color);font-size:14px}
.login-box label{display:block;font-size:13px;color:var(--secondary-color);margin:16px 0 6px;font-weight:500}
.input-wrapper{position:relative;margin-bottom:4px}
.input-wrapper i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--secondary-color);font-size:14px;pointer-events:none}
.input-wrapper input{width:100%;padding:12px 14px 12px 42px;border-radius:10px;border:1px solid var(--border-color);background:var(--search-area-bg);color:var(--main-color);font-size:14px;outline:none;font-family:inherit}
.input-wrapper input:focus{border-color:var(--link-color-active-bg)}
.input-wrapper input:focus + i{color:var(--link-color-active-bg)}
.toggle-senha{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--secondary-color);cursor:pointer;font-size:14px}
.toggle-senha:hover{color:var(--main-color)}
.btn-login{width:100%;padding:12px;border:none;border-radius:10px;background:var(--link-color-active-bg);color:#fff;font-weight:600;font-size:15px;cursor:pointer;margin-top:20px;transition:.2s}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.btn-login:hover:not(:disabled){opacity:.9}
.logo-wrapper{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:24px}
.logo-wrapper .app-name{font-size:22px;font-weight:700;color:var(--main-color)}
.error-msg{color:#dc2626;font-size:13px;margin-top:12px;display:none;text-align:center;padding:8px;background:rgba(220,38,38,.1);border-radius:6px}
.cadastro-link{text-align:center;margin-top:16px;font-size:14px}
.cadastro-link a{color:var(--link-color-active-bg);text-decoration:none}
.loading{display:none;text-align:center;color:var(--secondary-color);margin-top:12px;font-size:13px}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <div class="logo-wrapper">
      <i class="fa-solid fa-graduation-cap" style="font-size:40px;color:var(--link-color-active-bg)"></i>
      <span class="app-name">EduGest</span>
    </div>
    <h2>Entrar no Sistema</h2>
    <p>Acesso Restrito - Diretor e Secretaria</p>

    <form id="formLogin" onsubmit="fazerLogin(event)" autocomplete="on">
      <label>Email</label>
      <div class="input-wrapper">
        <input type="email" id="usuario" placeholder="Digite seu email" autocomplete="username" required>
        <i class="fa-solid fa-envelope"></i>
      </div>

      <label>Senha</label>
      <div class="input-wrapper">
        <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password" required>
        <i class="fa-solid fa-lock"></i>
        <span class="toggle-senha" onclick="toggleSenha()">
          <i class="fa-solid fa-eye" id="iconeOlho"></i>
        </span>
      </div>

      <p class="error-msg" id="erroMsg"></p>
      <p class="loading" id="loading"><i class="fa-solid fa-spinner fa-spin"></i> Autenticando...</p>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    </form>
    
    <div class="cadastro-link">
      <a href="cadastro.html">Criar nova conta</a>
      <br>
      <a href="recuperar.html">Esqueci a minha senha</a>
    </div>
  </div>
</div>

<script type="module" src="modulos/login.js"></script>
</body>
</html>
