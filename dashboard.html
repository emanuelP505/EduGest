<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
  <script type="module" src="auth-guard.js"></script>

<title>EduGest Dashboard</title>
<link rel="stylesheet" href="styles/style.css">
  <script src="libs/lucide.js"></script>
<script src="libs/jspdf.min.js"></script>
<script src="libs/autotable.min.js"></script>
<script src="libs/xlsx.full.min.js"></script>
<link rel="stylesheet" href="styles/normalize.min.css">
  
  <script src="scripts/theme.js"></script>
<style>
.badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.badge.red { background: rgba(220,38,38,.2); color: #dc2626; }
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 20px;
}
.card-box {
  background: var(--projects-section);
  border: 1px solid var(--border-color, #ddd);
  border-radius: 16px;
  padding: 20px;
}
.card-box h4 {
  margin: 0 0 16px 0;
  font-size: 14px;
  color: var(--secondary-color);
}
table {
  width: 100%;
  border-collapse: collapse;
}
table td, table th {
  text-align: left;
  padding: 10px 0;
  font-size: 14px;
}
table th {
  color: var(--secondary-color);
  font-weight: 600;
  border-bottom: 1px solid var(--border-color);
}
canvas {
  width: 100%;
  height: 200px;
}
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
.btn-secondary { background: var(--search-area-bg); color: var(--main-color); border: 1px solid var(--border-color, #ddd); }
.header-actions { display: flex; gap: 12px; }
.projects-section-header { display: flex; justify-content: space-between; align-items: center; }
.time { color: var(--secondary-color); font-size: 14px; font-weight: 400; }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <div class="app-header-left">
      <span class="app-icon"></span>
      <p class="app-name">GestEdu+</p>
    </div>
    <div class="app-header-right">
      <button class="mode-switch" title="Alternar Tema"><i data-lucide="moon"></i></button>
      <button class="profile-btn" id="btnPerfil">
        <div id="avatarIcon" style="width:32px;height:32px;border-radius:50%;background:var(--card-1);display:flex;align-items:center;justify-content:center;color:#2563eb"></div>
        <span id="userName">Usuário</span>
      </button>
    </div>
  </div>

  <div class="app-content">
    <div class="app-sidebar">
      <a href="dashboard.html" class="app-sidebar-link active" title="Dashboard"><i data-lucide="home"></i></a>
      <a href="funcionarios.html" class="app-sidebar-link" title="Funcionários"><i data-lucide="user"></i></a>
      <a href="prof.html" class="app-sidebar-link" title="Professores"><i data-lucide="users"></i></a>
      <a href="disciplina.html" class="app-sidebar-link" title="Disciplinas"><i data-lucide="book-open"></i></a>
      <a href="turmas.html" class="app-sidebar-link" title="Turmas"><i data-lucide="graduation-cap"></i></a>
        <a href="cursos.html" class="app-sidebar-link" title="Cursos"><i data-lucide="library"></i></a>
    
      <a href="estudantes.html" class="app-sidebar-link" title="Estudantes"><i data-lucide="school"></i></a>
      <a href="config.html" class="app-sidebar-link" title="Configurações"><i data-lucide="settings"></i></a>
    </div>

    <div class="projects-section">
      <div class="projects-section-header">
        <div>
          <p>Dashboard</p>
          <p class="time" id="dataHora"></p>
        </div>
        <div class="header-actions">
          <button class="btn btn-secondary" id="btnExportWord"><i data-lucide="file-text"></i> Word Atrasados</button>
          <button class="btn btn-secondary" id="btnExportExcel"><i data-lucide="file-spreadsheet"></i> Excel Completo</button>
        </div>
      </div>

      <div class="projects-section-line">
        <div class="projects-status">
          <div class="item-status">
            <span class="status-number" id="cardTotalEst">0</span>
            <span class="status-type">Estudantes</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="cardTotalTurmas">0</span>
            <span class="status-type">Turmas</span>
          </div>
        <div class="item-status">
  <span class="status-number" id="cardArrecadado">0 KZ</span>
  <span class="status-type">Neste Mês</span>
  <span class="status-sub" id="cardArrecadadoAno" style="font-size:11px; opacity:0.7;">Ano: 0 KZ</span>
</div>
          <div class="item-status">
            <span class="status-number" id="cardAtraso">0</span>
            <span class="status-type">Em Atraso</span>
          </div>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card-box" style="grid-column: span 2;">
          <h4>Arrecadação Ano Lectivo</h4>
          <canvas id="graficoArrecadacao"></canvas>
        </div>

        <div class="card-box">
          <h4>Atividade Recente</h4>
          <div id="atividadeRecente">
            <p style="color: var(--secondary-color);">Nenhum pagamento ainda</p>
          </div>
        </div>

        <div class="card-box" style="grid-column: span 3;">
          <h4>Estudantes em Atraso</h4>
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Turma</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="tbodyAtrasados">
              <tr><td colspan="3" style="color: var(--secondary-color);">Nenhum em atraso</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
 
<script src="modulos/dashboard.js">


      
</script>
</body>
</html>
