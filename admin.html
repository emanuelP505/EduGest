<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGest Admin</title>
<link rel="stylesheet" href="styles/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.admin-wrap{max-width:1200px;margin:20px auto;padding:20px}
.tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border-color)}
.tab{padding:12px 20px;cursor:pointer;border-radius:8px 8px 0 0}
.tab.ativa{background:var(--projects-section);border:1px solid var(--border-color);border-bottom:none}
.painel{display:none}
.painel.ativo{display:block}
.card{background:var(--projects-section);border:1px solid var(--border-color);border-radius:12px;padding:20px;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border-color);font-size:14px}
.btn{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-red{background:#dc2626;color:#fff}
.btn-green{background:#16a34a;color:#fff}
.btn-blue{background:var(--link-color-active-bg);color:#fff}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:var(--search-area-bg);color:var(--main-color);margin-bottom:12px}
#acessoNegado{text-align:center;padding:60px 20px;display:none}
</style>
</head>
<body>
<div id="acessoNegado">
  <i class="fa-solid fa-ban" style="font-size:60px;color:#dc2626"></i>
  <h2>Acesso Negado</h2>
</div>

<div class="admin-wrap" id="adminContent" style="display:none">
  <h1><i class="fa-solid fa-user-shield"></i> Painel Admin EduGest</h1>

  <div class="tabs">
    <div class="tab ativa" onclick="trocarAba('usuarios')">Usuários</div>
    <div class="tab" onclick="trocarAba('escolas')">Escolas</div>
    <div class="tab" onclick="trocarAba('suporte')">Suporte</div>
  </div>

<div class="container">
  <div class="header">
    <h1>Admin EduGest</h1>
    <button class="btn btn-red" onclick="logout()">Sair</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="convites">Convites</div>
    <div class="tab" data-tab="usuarios">Criar Usuário</div>
    <div class="tab" data-tab="escolas">Escolas</div>
  </div>

  <!-- ABA CONVITES -->
  <div class="painel active" id="painel-convites">
    <div class="card">
      <h3>Gerar Código de Convite</h3>
      <div class="grid">
        <input id="nomeEscolaConvite" placeholder="Nome da escola cliente">
        <input id="emailLiberado" type="email" placeholder="Email do diretor - opcional">
      </div>
      <button class="btn btn-blue" onclick="gerarCodigo()">Gerar Código</button>
      <div id="codigoGerado" style="margin-top:16px"></div>
    </div>
    
    <div class="card">
      <h3>Códigos Ativos</h3>
      <table>
        <thead><tr><th>Código</th><th>Escola</th><th>Email Liberado</th><th>Criado</th><th>Ação</th></tr></thead>
        <tbody id="listaCodigos"></tbody>
      </table>
    </div>
  </div>

  <!-- ABA USUÁRIOS -->
  <div class="painel" id="painel-usuarios">
    <div class="card">
      <h3>Criar Usuário Manual - Emergência</h3>
      <form id="formAdmin" onsubmit="event.preventDefault(); criarUsuarioManual()">
        <select id="escolaId" required></select>
        <input id="nome" placeholder="Nome" required>
        <input id="email" type="email" placeholder="Email" required>
        <input id="senha" type="password" placeholder="Senha mín 6" required>
        <select id="perfil" required>
          <option value="diretor">Diretor</option>
          <option value="secretario">Secretário</option>
        </select>
        <button class="btn btn-blue" type="submit">Criar</button>
      </form>
    </div>
  </div>

  <!-- ABA ESCOLAS -->
  <div class="painel" id="painel-escolas">
    <div class="card">
      <h3>Escolas Cadastradas</h3>
      <table>
        <thead><tr><th>Nome</th><th>Diretor</th><th>Email</th><th>Criado em</th></tr></thead>
        <tbody id="listaEscolas"></tbody>
      </table>
    </div>
  </div>
</div>
<script type="module" src="admin.js"></script>
</body>
</html>
