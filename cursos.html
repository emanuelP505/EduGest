<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<title>EduGest Cursos</title>
  <script type="module" src="auth-guard.js"></script>

<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="lucide.js"></script>
<script src="jspdf.min.js"></script>
<script src="autotable.min.js"></script>
<script src="xlsx.full.min.js"></script>
<link rel="stylesheet" href="normalize.min.css">
 
<style>
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--projects-section);
  border: 1px solid var(--border-color, #ddd);
  border-radius: 16px;
  padding: 24px;
  width: 100%; max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
}
.modal h3 { margin: 0 0 16px 0; color: var(--main-color); }
.modal label { display: block; font-size: 13px; color: var(--secondary-color); margin: 12px 0 4px; }
.modal input,.modal select {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border-color, #ddd);
  background: var(--search-area-bg);
  color: var(--main-color);
  font-family: inherit; font-size: 14px; outline: none;
}
.modal input:focus,.modal select:focus { border-color: var(--link-color-active-bg); }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--link-color-active-bg); color: #fff; }
.btn-secondary { background: var(--search-area-bg); color: var(--main-color); border: 1px solid var(--border-color, #ddd); }
.project-btn-more { background: var(--search-area-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px; cursor: pointer; color: var(--main-color); }
</style>
</head>
<body>
  <div id="offlineBanner" style="display:none; background:#f59e0b; color:#000; padding:12px; text-align:center; position:fixed; top:0; left:0; right:0; z-index:9999;">
  <i data-lucide="wifi-off"></i> Modo Offline - Dados em cache. Cadastros indisponíveis.
</div>
<div class="app-container">
  <div class="app-header">
    <div class="app-header-left">
      <span class="app-icon"></span>
      <p class="app-name">EduGest</p>
      <div class="search-wrapper">
        <input class="search-input" type="text" placeholder="Buscar curso..." id="searchCurso">
        <i data-lucide="search"></i>
      </div>
    </div>
    <div class="app-header-right">
      <button class="mode-switch" title="Alternar Tema"><i data-lucide="moon"></i></button>
      <button class="add-btn" title="Novo Curso" id="btnAddCurso"><i data-lucide="plus"></i></button>
      <button class="profile-btn" id="btnPerfil">
        <div id="avatarIcon" style="width:32px;height:32px;border-radius:50%;background:var(--card-1);display:flex;align-items:center;justify-content:center;color:#2563eb"></div>
        <span id="userName">Usuário</span>
      </button>
    </div>
  </div>

  <div class="app-content">
    <div class="app-sidebar">
      <a href="dashboard.html" class="app-sidebar-link" title="Dashboard"><i data-lucide="home"></i></a>
      <a href="funcionarios.html" class="app-sidebar-link" title="Funcionários"><i data-lucide="user"></i></a>
      <a href="prof.html" class="app-sidebar-link" title="Professores"><i data-lucide="users"></i></a>
      <a href="disciplina.html" class="app-sidebar-link" title="Disciplinas"><i data-lucide="book-open"></i></a>
      <a href="turmas.html" class="app-sidebar-link" title="Turmas"><i data-lucide="graduation-cap"></i></a>
      <a href="cursos.html" class="app-sidebar-link active" title="Cursos"><i data-lucide="library"></i></a>
      <a href="estudantes.html" class="app-sidebar-link" title="Estudantes"><i data-lucide="school"></i></a>
      <a href="config.html" class="app-sidebar-link" title="Configurações"><i data-lucide="settings"></i></a>
    </div>

    <div class="projects-section">
      <div class="projects-section-header">
        <p>Cursos</p>
        <div class="view-actions">
          <button class="view-btn list-view" title="Lista"><i data-lucide="list"></i></button>
          <button class="view-btn grid-view active" title="Grade"><i data-lucide="layout-grid"></i></button>
        </div>
      </div>

      <div class="projects-section-line">
        <div class="projects-status" id="cursoStats">
          <div class="item-status">
            <span class="status-number" id="totalCursos">0</span>
            <span class="status-type">Cursos</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="totalTurmas">0</span>
            <span class="status-type">Turmas</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="totalAlunos">0</span>
            <span class="status-type">Alunos</span>
          </div>
        </div>
      </div>

      <div class="project-boxes jsGridView" id="cursoContainer"></div>
    </div>
  </div>
</div>

<!-- Modal Cadastro -->
<div class="modal-backdrop" id="modalCurso">
  <div class="modal">
    <h3 id="modalTitle">Novo Curso</h3>
    <label>Nome do Curso</label>
    <input type="text" id="nomeCurso" placeholder="Ex: Informática">

    <label>Área</label>
    <select id="areaCurso">
      <option>Ciências Exatas</option>
      <option>Humanidades</option>
      <option>Técnico</option>
      <option>Biológicas</option>
    </select>

    <label>Duração em anos</label>
    <input type="number" id="duracaoCurso" min="1" max="5" value="3">

    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvar">Salvar</button>
    </div>
  </div>
</div>


<script type="module" src="cursos.js">

    
</script>
</body>
</html>
