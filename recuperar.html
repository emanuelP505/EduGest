<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduGest Recuperar Senha</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--app-bg)}
.login-box{background:var(--projects-section);border:1px solid var(--border-color);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box h2{text-align:center;margin:0 0 8px 0;color:var(--main-color);font-size:24px}
.input-wrapper{position:relative;margin-bottom:16px}
.input-wrapper input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #ccc;background:var(--search-area-bg);color:var(--main-color);font-size:14px;outline:none}
.btn-login{width:100%;padding:12px;border:none;border-radius:10px;background:var(--link-color-active-bg);color:#fff;font-weight:600;font-size:15px;cursor:pointer;margin-top:20px}
.error-msg{color:#dc2626;font-size:13px;margin-top:12px;display:none;text-align:center;padding:8px;background:rgba(220,38,.1);border-radius:6px}
.success-msg{color:#16a34a;font-size:13px;margin-top:12px;display:none;text-align:center;padding:8px;background:rgba(22,163,74,.1);border-radius:6px}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-box">
    <h2>Recuperar Senha</h2>
    <p style="text-align:center;font-size:14px;color:var(--secondary-color);margin-bottom:20px">
      Digite teu email cadastrado. Vamos enviar um link pra redefinir a senha.
    </p>
    <div class="input-wrapper">
      <input type="email" id="emailRec" placeholder="teu@email.com" required>
    </div>
    <button class="btn-login" id="btnRecuperar">Enviar link de recuperação</button>

    <p class="error-msg" id="erroMsg"></p>
    <p class="success-msg" id="sucessoMsg"></p>

    <div style="text-align:center;margin-top:16px;font-size:14px">
      <a href="login.html" style="color:var(--link-color-active-bg)">Voltar pro login</a>
    </div>
  </div>
</div>

<script type="module" src="recover.js"></script>
</body>
</html>
