<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<title>EduGest Turmas</title>
  <script type="module" src="auth-guard.js"></script>


<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="lucide.js"></script>
<script src="jspdf.min.js"></script>
<script src="autotable.min.js"></script>
<script src="xlsx.full.min.js"></script>
<link rel="stylesheet" href="normalize.min.css">
 <style>
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--projects-section);
  border: 1px solid var(--border-color, #ddd);
  border-radius: 16px;
  padding: 24px;
  width: 100%; max-width: 450px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { margin: 0 0 16px 0; color: var(--main-color); }
.modal label { display: block; font-size: 13px; color: var(--secondary-color); margin: 12px 0 4px; }
.modal input,.modal select {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border-color, #ddd);
  background: var(--search-area-bg);
  color: var(--main-color);
  font-family: inherit; font-size: 14px; outline: none;
}
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--link-color-active-bg); color: #fff; }
.btn-secondary { background: var(--search-area-bg); color: var(--main-color); border: 1px solid var(--border-color, #ddd); }
.badge.turno {
  background: rgba(59,130,246,.2);
  color: #3b82f6;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
}
.filtro-turno {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.filtro-btn {
  padding: 6px 12px;
  border: 1px solid var(--border-color, #ddd);
  background: var(--search-area-bg);
  color: var(--main-color);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
.filtro-btn.active {
  background: var(--link-color-active-bg);
  color: #fff;
  border-color: var(--link-color-active-bg);
}
.project-btn-more { background: var(--search-area-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px; cursor: pointer; color: var(--main-color); }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <div class="app-header-left">
      <span class="app-icon"></span>
      <p class="app-name">EduGest</p>
      <div class="search-wrapper">
        <input class="search-input" type="text" placeholder="Buscar turma..." id="searchTurma">
        <i data-lucide="search"></i>
      </div>
    </div>
    <div class="app-header-right">
      <button class="mode-switch" title="Alternar Tema"><i data-lucide="moon"></i></button>
      <button class="add-btn" title="Nova Turma" id="btnAddTurma"><i data-lucide="plus"></i></button>
      <button class="profile-btn" id="btnPerfil">
        <div id="avatarIcon" style="width:32px;height:32px;border-radius:50%;background:var(--card-1);display:flex;align-items:center;justify-content:center;color:#2563eb"></div>
        <span id="userName">Usuário</span>
      </button>
    </div>
  </div>

  <div class="app-content">
    <div class="app-sidebar">
      <a href="dashboard.html" class="app-sidebar-link" title="Dashboard"><i data-lucide="home"></i></a>
      <a href="funcionarios.html" class="app-sidebar-link" title="Funcionários"><i data-lucide="user"></i></a>
      <a href="prof.html" class="app-sidebar-link" title="Professores"><i data-lucide="users"></i></a>
      <a href="disciplina.html" class="app-sidebar-link" title="Disciplinas"><i data-lucide="book-open"></i></a>
      <a href="turmas.html" class="app-sidebar-link active" title="Turmas"><i data-lucide="graduation-cap"></i></a>
      <a href="cursos.html" class="app-sidebar-link" title="Cursos"><i data-lucide="library"></i></a>
      <a href="estudantes.html" class="app-sidebar-link" title="Estudantes"><i data-lucide="school"></i></a>
      <a href="config.html" class="app-sidebar-link" title="Configurações"><i data-lucide="settings"></i></a>
    </div>

    <div class="projects-section">
      <div class="projects-section-header">
        <p>Turmas</p>
        <div class="view-actions">
          <button class="view-btn list-view" title="Lista"><i data-lucide="list"></i></button>
          <button class="view-btn grid-view active" title="Grade"><i data-lucide="layout-grid"></i></button>
         
        </div>
      </div>

      <div class="filtro-turno">
        <button class="filtro-btn active" data-turno="Todos">Todos</button>
        <button class="filtro-btn" data-turno="Manhã">Manhã</button>
        <button class="filtro-btn" data-turno="Tarde">Tarde</button>
        <button class="filtro-btn" data-turno="Noite">Noite</button>
      </div>

      <div class="projects-section-line">
        <div class="projects-status" id="turmaStats">
          <div class="item-status">
            <span class="status-number" id="totalTurmas">0</span>
            <span class="status-type">Total</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="totalAlunos">0</span>
            <span class="status-type">Alunos</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="ocupacaoMedia">0%</span>
            <span class="status-type">Ocupação</span>
          </div>
        </div>
      </div>

      <div class="project-boxes jsGridView" id="turmaContainer"></div>
    </div>
  </div>
</div>

<!-- Modal Cadastro Turma -->
<div class="modal-backdrop" id="modalTurma">
  <div class="modal">
    <h3 id="modalTitle">Nova Turma</h3>

    <label>Nome da Turma</label>
    <input type="text" id="nomeTurma" placeholder="Ex: 10ª A">

    <label>Curso</label>
    <select id="cursoTurma"></select>

    <label>Turno</label>
    <select id="turnoTurma">
      <option value="Manhã">Manhã</option>
      <option value="Tarde">Tarde</option>
      <option value="Noite">Noite</option>
    </select>

    <label>Vagas Totais</label>
    <input type="number" id="vagasTurma" min="1" value="35">

    <label>Valor da Propina - KZ</label>
    <input type="number" id="propinaTurma" min="0" value="15000">

    <label>Ano Letivo</label>
    <input type="text" id="anoTurma" value="2025/2026">

    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancelarTurma">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvarTurma">Salvar</button>
    </div>
  </div>
</div>
  

<script type="module" src="turmas.js">    
   
</script>
</body>
</html>
