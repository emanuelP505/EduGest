<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<title>EduGest Funcionários - RH</title>
  <script type="module" src="auth-guard.js"></script>

<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="lucide.js"></script>
<script src="jspdf.min.js"></script>
<script src="autotable.min.js"></script>
<script src="xlsx.full.min.js"></script>
<link rel="stylesheet" href="normalize.min.css">
 
  
  <style>
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
.modal-backdrop.active { display: flex; }
.modal {
  background: var(--projects-section);
  border: 1px solid var(--border-color, #ddd);
  border-radius: 16px;
  padding: 24px;
  width: 100%; max-width: 500px;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { margin: 0 0 16px 0; color: var(--main-color); }
.modal label { display: block; font-size: 13px; color: var(--secondary-color); margin: 12px 0 4px; }
.modal input,.modal select {
  width: 100%; padding: 10px 12px; border-radius: 8px;
  border: 1px solid var(--border-color, #ddd);
  background: var(--search-area-bg);
  color: var(--main-color);
  font-family: inherit; font-size: 14px; outline: none;
}
.modal input:focus,.modal select:focus { border-color: var(--link-color-active-bg); }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-primary { background: var(--link-color-active-bg); color: #fff; }
.btn-secondary { background: var(--search-area-bg); color: var(--main-color); border: 1px solid var(--border-color, #ddd); }
.badge.status {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.badge.ativo { background: rgba(22,163,74,.2); color: #16a34a; }
.badge.ferias { background: rgba(202,138,4,.2); color: #ca8a04; }
.badge.inativo { background: rgba(220,38,38,.2); color: #dc2626; }
.filtro-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filtro-btn {
  padding: 6px 12px;
  border: 1px solid var(--border-color, #ddd);
  background: var(--search-area-bg);
  color: var(--main-color);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
.filtro-btn.active {
  background: var(--link-color-active-bg);
  color: #fff;
  border-color: var(--link-color-active-bg);
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.project-btn-more { background: var(--search-area-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px; cursor: pointer; color: var(--main-color); }
  .app-header-left { display: flex; align-items: center; gap: 16px; }
.search-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  background: var(--search-area-bg);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 0 12px;
  height: 36px;
  width: 280px;
}
.search-input {
  border: none;
  outline: none;
  background: transparent;
  color: var(--main-color);
  font-size: 14px;
  width: 100%;
  padding-right: 8px;
}
.search-wrapper i {
  color: var(--secondary-color);
  width: 16px;
  height: 16px;
}
.app-header-right { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <div class="app-header-left">
      <span class="app-icon"></span>
      <p class="app-name">EduGest</p>
      <div class="search-wrapper">
        <input class="search-input" type="text" placeholder="Buscar funcionário..." id="searchFunc">
        <i data-lucide="search"></i>
      </div>
    </div>
    <div class="app-header-right">
      <button class="mode-switch" title="Alternar Tema"><i data-lucide="moon"></i></button>
  <!-- Troca o botão de Add -->
<button class="add-btn" title="Novo Funcionário" id="btnAddFunc" style="display:none">
  <i data-lucide="plus"></i>
</button>
      <button class="add-btn" title="Gerar Folha PDF" id="btnPdfFolha" style="background:#16a34a;color:#fff;display:flex;gap:6px;align-items:center;padding:0 12px;">
  <i data-lucide="file-text"></i>
  <span style="font-size:13px;font-weight:600;">pdf</span>
</button>
          <button class="profile-btn" id="btnPerfil">
        <div id="avatarIcon" style="width:32px;height:32px;border-radius:50%;background:var(--card-1);display:flex;align-items:center;justify-content:center;color:#2563eb"></div>
        <span id="userName">Usuário</span>
      </button>
    </div>
  </div>

  <div class="app-content">
    <div class="app-sidebar">
      <a href="dashboard.html" class="app-sidebar-link" title="Dashboard"><i data-lucide="home"></i></a>
      <a href="funcionarios.html" class="app-sidebar-link active" title="Funcionários"><i data-lucide="user"></i></a>
      <a href="prof.html" class="app-sidebar-link" title="Professores"><i data-lucide="users"></i></a>
      <a href="disciplina.html" class="app-sidebar-link" title="Disciplinas"><i data-lucide="book-open"></i></a>
      <a href="turmas.html" class="app-sidebar-link" title="Turmas"><i data-lucide="graduation-cap"></i></a>
      <a href="cursos.html" class="app-sidebar-link" title="Cursos"><i data-lucide="library"></i></a>
      <a href="estudantes.html" class="app-sidebar-link" title="Estudantes"><i data-lucide="school"></i></a>
      <a href="config.html" class="app-sidebar-link" title="Configurações"><i data-lucide="settings"></i></a>
    </div>

    <div class="projects-section">
      <div class="projects-section-header">
        <p>Gestão de Funcionários - RH</p>
        <div class="view-actions">
          <button class="view-btn list-view" title="Lista"><i data-lucide="list"></i></button>
          <button class="view-btn grid-view active" title="Grade"><i data-lucide="layout-grid"></i></button>
        </div>
      </div>

      <div class="filtro-bar">
        <button class="filtro-btn active" data-filtro="Todos">Todos</button>
        <button class="filtro-btn" data-filtro="ativo">Ativos</button>
        <button class="filtro-btn" data-filtro="ferias">Férias</button>
        <button class="filtro-btn" data-filtro="inativo">Inativos</button>
      </div>

      <div class="projects-section-line">
        <div class="projects-status" id="funcStats">
          <div class="item-status">
            <span class="status-number" id="totalFunc">0</span>
            <span class="status-type">Total</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="ativosFunc">0</span>
            <span class="status-type">Ativos</span>
          </div>
          <div class="item-status">
            <span class="status-number" id="feriasFunc">0</span>
            <span class="status-type">De Férias</span>
          </div>
        </div>
      </div>

      <div class="project-boxes jsGridView" id="funcContainer"></div>
    </div>
  </div>
</div>

<!-- Modal Cadastro -->
<div class="modal-backdrop" id="modalFunc">
  <div class="modal">
    <h3 id="modalTitle">Novo Funcionário</h3>

    <div class="form-grid">
      <div>
        <label>Nome Completo</label>
        <input type="text" id="nomeFunc" placeholder="Ex: Ana Silva">
      </div>
      <div>
        <label>BI / Nº Funcionário</label>
        <input type="text" id="biFunc" placeholder="Ex: 001234567LA045">
      </div>
    </div>

    <div class="form-grid">
      <div>
        <label>Telefone</label>
        <input type="text" id="telFunc" placeholder="923 456 789">
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="emailFunc" placeholder="ana@escola.ao">
      </div>
    </div>

    <div class="form-grid">
      <div>
        <label>Departamento</label>
        <select id="deptFunc">
          <option>RH</option>
          <option>Financeiro</option>
          <option>Limpeza</option>
          <option>Secretaria</option>
          <option>Manutenção</option>
          <option>Segurança</option>
        </select>
      </div>
      <div>
        <label>Cargo</label>
        <input type="text" id="cargoFunc" placeholder="Ex: Secretária">
      </div>
    </div>

    <div class="form-grid">
      <div>
        <label>Salário Base - KZ</label>
        <input type="number" id="salarioFunc" min="0" value="0">
      </div>
      <div>
        <label>Tipo Contrato</label>
        <select id="contratoFunc">
          <option>Efetivo</option>
          <option>Contratado</option>
          <option>Estágio</option>
        </select>
      </div>
    </div>

    <div class="form-grid">
      <div>
        <label>Data Nascimento</label>
        <input type="date" id="nascFunc">
      </div>
      <div>
        <label>Data Admissão</label>
        <input type="date" id="admissaoFunc">
      </div>
    </div>

    <label>Endereço</label>
    <input type="text" id="endFunc" placeholder="Bairro, Município">

    <label>Status</label>
    <select id="statusFunc">
      <option value="ativo">Ativo</option>
      <option value="ferias">Férias</option>
      <option value="inativo">Inativo</option>
    </select>

    <label>Foto URL</label>
    <input type="text" id="fotoFunc" placeholder="Cole link da imagem">

    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancelar">Cancelar</button>
      <button class="btn btn-primary" id="btnSalvar">Salvar</button>
    </div>
  </div>
</div>
 
<script type="module" src="funcionarios.js"></script>
</body>
</html>
