<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conta Suspensa - EduGest</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.bloqueado-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--app-bg);
  padding: 20px;
}
.bloqueado-box {
  background: var(--projects-section);
  border: 1px solid var(--border-color);
  border-radius: 20px;
  padding: 48px 32px;
  width: 100%;
  max-width: 480px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.icone-bloqueio {
  font-size: 72px;
  color: #dc2626;
  margin-bottom: 24px;
}
.bloqueado-box h1 {
  color: var(--main-color);
  font-size: 28px;
  margin: 0 0 12px 0;
}
.bloqueado-box p {
  color: var(--secondary-color);
  font-size: 16px;
  line-height: 1.6;
  margin: 0 0 24px 0;
}
.motivo-box {
  background: rgba(220,38,38,.1);
  border: 1px solid rgba(220,38,38,.3);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 24px;
}
.motivo-box strong {
  color: #dc2626;
  display: block;
  margin-bottom: 8px;
}
.btn-contato {
  display: inline-block;
  padding: 12px 24px;
  background: #25d366;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  margin: 8px;
  transition: .2s;
}
.btn-contato:hover {
  background: #1fa855;
  transform: translateY(-2px);
}
.btn-logout {
  display: inline-block;
  padding: 12px 24px;
  background: var(--search-area-bg);
  color: var(--main-color);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  text-decoration: none;
  font-weight: 600;
  margin: 8px;
  cursor: pointer;
}
.info-rodape {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border-color);
  font-size: 13px;
  color: var(--secondary-color);
}
</style>
</head>
<body>
<div class="bloqueado-container">
  <div class="bloqueado-box">
    <i class="fa-solid fa-ban icone-bloqueio"></i>
    <h1>Conta Suspensa</h1>
    <p>O acesso da tua escola ao EduGest foi temporariamente bloqueado.</p>
    
    <div class="motivo-box">
      <strong>Motivo:</strong>
      <span id="motivoBloqueio">Carregando...</span>
    </div>

    <p>Para reativar o acesso, regularize a situação com nossa equipe.</p>

    <a href="https://wa.me/244XXXXXXXXX?text=Olá,%20minha%20escola%20está%20bloqueada%20no%20EduGest.%20Preciso%20de%20ajuda." 
       class="btn-contato" 
       target="_blank">
      <i class="fa-brands fa-whatsapp"></i> Falar no WhatsApp
    </a>
    
    <button class="btn-logout" onclick="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Sair
    </button>

    <div class="info-rodape">
      <i class="fa-solid fa-circle-info"></i> 
      Escola ID: <span id="escolaId">-</span><br>
      Se acha que isso é um erro, entre em contato.
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkOF8Az4NskBnGx1HyTY9wIfsFHC5aRjw",
  authDomain: "edugest-4bdc3.firebaseapp.com",
  projectId: "edugest-4bdc3",
  storageBucket: "edugest-4bdc3.firebasestorage.app",
  messagingSenderId: "1092615797287",
  appId: "1:1092615797287:web:177ab66d1134e04cb42c02"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = './'; // se deslogou, volta pro login
        return;
    }
    
    // Pega dados da escola pra mostrar motivo e ID
    const userSnap = await getDoc(doc(db, 'usuarios', user.uid));
    if (userSnap.exists()) {
        const escolaId = userSnap.data().escolaId;
        const escolaSnap = await getDoc(doc(db, 'escolas', escolaId));
        if (escolaSnap.exists()) {
            const escola = escolaSnap.data();
            document.getElementById('motivo').textContent = escola.motivoBloqueio || 'Inadimplência';
            document.getElementById('escolaId').textContent = escolaId;
            
            // Se a escola foi descongelada, manda pro dashboard
            if (escola.ativo !== false) {
                window.location.href = './dashboard.html';
            }
        }
    }
});

window.sair = async () => {
    await signOut(auth);
    window.location.href = './';
};

window.whatsapp = () => {
    const msg = encodeURIComponent('Olá, minha escola foi suspensa no EduGest. Preciso regularizar.');
    window.open(`https://wa.me/244922579570?text=${msg}`, '_blank'); // Troca pelo teu número
};
</script>
</body>
</html>
