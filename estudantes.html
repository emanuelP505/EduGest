<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<title>EduGest Estudantes</title>
  <script type="module" src="auth-guard.js"></script>


<link rel="stylesheet" href="style.css">
<script src="theme.js"></script>
<script src="lucide.js"></script>
<script src="jspdf.min.js"></script>
<script src="autotable.min.js"></script>
<script src="xlsx.full.min.js"></script>
<link rel="stylesheet" href="normalize.min.css">
 
  <style>
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-backdrop.active { display: flex; }
.modal { 
  background: var(--projects-section);
  border: 1px solid var(--border-color); 
  border-radius: 16px;
  padding: 24px; 
  width: 100%;
  max-width: 800px; 
  max-height: 90vh;
  overflow-y: auto; }
.modal h3 { margin: 0 0 16px 0; color: var(--main-color); }
.modal label { display: block; font-size: 13px; color: var(--secondary-color); margin: 12px 0 4px; font-weight: 500; }
.modal input,.modal select { 
  width: 100%; 
  padding: 10px 12px; 
  border-radius: 8px;
  border: 1px solid #ccc; 
  background: var(--search-area-bg); 
  color: var(--main-color);
  font-size: 14px;
  outline: none; }
.modal-actions {
  display: flex; 
  gap: 12px; 
  justify-content: flex-end;
  margin-top: 20px; }
.btn { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: var(--link-color-active-bg); color: #fff; }
.btn-secondary { background: var(--search-area-bg); color: var(--main-color); border: 1px solid var(--border-color); }
.btn-success { background: #16a34a; color: #fff; }
.badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.badge.green { background: rgba(22,163,74,.2); color: #16a34a; }
.badge.red { background: rgba(220,38,38,.2); color: #dc2626; }

  
  
 table { width: 100%; border-collapse: collapse; }
table th, table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
table th { color: var(--secondary-color); font-weight: 600; }
.project-btn-more { background: var(--search-area-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 6px; cursor: pointer; color: var(--main-color); }
table td { color: var(--main-color); }
tbody tr td[colspan="5"] { color: var(--secondary-color)!important; }
tbody tr:hover td { background-color: var(--search-area-bg); transition: 0.2s; }

/* NOTAS POR DISCIPLINA */
.disciplinas-notas { margin-top: 16px; }
.disciplina-item { background: var(--search-area-bg); padding: 16px; border-radius: 12px; margin-bottom: 12px; }
.disciplina-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.disciplina-nome { font-weight: 600; color: var(--main-color); }
.trimestre-badge { background: var(--card-1); color: #2563eb; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 600; }
.notas-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.notas-inputs div { text-align: center; }
.notas-inputs label { margin: 0 0 6px 0; font-size: 12px; }
.notas-inputs input { text-align: center; font-weight: 600; }
.media-disc { text-align: right; margin-top: 12px; font-size: 14px; color: var(--secondary-color); }
.media-disc strong { color: var(--main-color); font-size: 18px; }

.media-final-box { margin-top: 20px; padding: 20px; background: var(--card-2); border-radius: 12px; text-align: center; }
.media-final-box h4 { margin: 0 0 8px 0; color: var(--secondary-color); font-size: 14px; }
.media-final-box.nota { font-size: 40px; font-weight: 700; color: var(--main-color); }

/* PROPINA */
.propina-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 16px; }
.mes-propina { background: var(--search-area-bg); padding: 12px; border-radius: 8px; text-align: center; }
.mes-propina.pago { background: rgba(22,163,74,.2); border: 1px solid #16a34a; }
.mes-propina label { margin: 0 0 8px 0; font-size: 12px; display: block; }
.mes-propina input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }

/* HEADER RESPONSIVO */
.projects-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  color: var(--main-color);
  flex-wrap: wrap;
  gap: 12px;
}
.projects-section-header p {
  font-size: 24px;
  font-weight: 700;
  margin: 0;
}
.header-actions {
  display: flex !important;
  gap: 8px !important;
  align-items: center !important;
  flex-wrap: wrap !important;
}
.search-wrapper {
  position: relative !important;
  display: block !important;
  flex: 1 1 200px !important;
  min-width: 200px !important;
}
#buscaEstudante {
  padding: 10px 12px 10px 36px !important;
  border-radius: 8px !important;
  border: 1px solid var(--border-color) !important;
  background: var(--search-area-bg) !important;
  color: var(--main-color) !important;
  width: 100% !important;
  outline: none !important;
  font-size: 16px !important;
}

@media (max-width: 768px) {
  .projects-section-header {
    flex-direction: column !important;
    align-items: stretch !important;
    gap: 12px !important;
  }
  .header-actions {
    justify-content: flex-start !important;
  }
  .header-actions .btn {
    padding: 10px 12px !important;
    font-size: 13px !important;
    white-space: nowrap !important;
  }
  .search-wrapper {
    flex: 1 1 100% !important;
    order: -1;
  }
  table th:nth-child(2), 
  table td:nth-child(2) { display: none !important; }
  table th, table td { 
    padding: 8px 6px !important; 
    font-size: 13px !important; 
  }
}
</style>
</head>
<body><div id="offlineBanner" style="display:none; background:#f59e0b; color:#000; padding:12px; text-align:center; position:fixed; top:0; left:0; right:0; z-index:9999;">
  <i data-lucide="wifi-off"></i> Modo Offline - Dados em cache. Cadastros indisponíveis.
</div>
<div class="app-container">
  <div class="app-header">
    <div class="app-header-left">
      <span class="app-icon"></span>
      <p class="app-name">EduGest</p>
    </div>
    <div class="app-header-right">
      <button class="mode-switch" title="Alternar Tema"><i data-lucide="moon"></i></button>
      <button class="profile-btn" id="btnPerfil">
        <div id="avatarIcon" style="width:32px;height:32px;border-radius:50%;background:var(--card-1);display:flex;align-items:center;justify-content:center;color:#2563eb"></div>
        <span id="userName">Usuário</span>
      </button>
    </div>
  </div>

  <div class="app-content">
    <div class="app-sidebar">
      <a href="dashboard.html" class="app-sidebar-link" title="Dashboard"><i data-lucide="home"></i></a>
      <a href="funcionarios.html" class="app-sidebar-link" title="Funcionários"><i data-lucide="user"></i></a>
      <a href="prof.html" class="app-sidebar-link" title="Professores"><i data-lucide="users"></i></a>
      <a href="disciplina.html" class="app-sidebar-link" title="Disciplinas"><i data-lucide="book-open"></i></a>
      <a href="turmas.html" class="app-sidebar-link" title="Turmas"><i data-lucide="graduation-cap"></i></a>
      <a href="cursos.html" class="app-sidebar-link" title="Cursos"><i data-lucide="library"></i></a>
      <a href="estudantes.html" class="app-sidebar-link active" title="Estudantes"><i data-lucide="school"></i></a>
      <a href="config.html" class="app-sidebar-link" title="Configurações"><i data-lucide="settings"></i></a>
    </div>

    <div class="projects-section">
      <div class="projects-section-header">
        <p>Estudantes</p>
        <div class="header-actions">
          <div class="search-wrapper">
            <input type="text" id="buscaEstudante" placeholder="Buscar nome, BI ou turma...">
            <i data-lucide="search" style="position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--secondary-color); width:18px; height:18px;"></i>
          </div>
          <button class="btn btn-secondary" id="btnBaixarModelo"><i data-lucide="download"></i> Modelo</button>
          <button class="btn btn-secondary" id="btnImportar"><i data-lucide="upload"></i> Importar</button>
          <button class="btn btn-primary" id="btnNovoEstudante"><i data-lucide="plus"></i> Novo</button>
          <input type="file" id="inputExcel" accept=".xlsx,.xls" style="display:none">
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>BI</th>
            <th>Turma</th>
            <th>Propina</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbodyEstudantes">
          <tr><td colspan="5" style="text-align:center;color:var(--secondary-color);padding:40px">Nenhum estudante cadastrado</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Cadastro/Edição -->
<div class="modal-backdrop" id="modalEstudante">
  <div class="modal">
    <h3 id="modalTitle">Novo Estudante</h3>
    <label>Nome Completo</label>
    <input type="text" id="nomeEst">
    <label>BI</label>
    <input type="text" id="biEst">
    <label>Turma</label>
    <select id="turmaEst"></select>
    <label>Encarregado</label>
    <input type="text" id="encEst">
    <label>Telefone</label>
    <input type="text" id="telEst">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="fecharModal('modalEstudante')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarEstudante()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Notas por Disciplina -->
<div class="modal-backdrop" id="modalNotas">
  <div class="modal">
    <h3 id="nomeAlunoNotas">Notas do Aluno</h3>
    <p style="color:var(--secondary-color);font-size:13px;margin:-8px 0 16px 0" id="trimestreAtual">Trimestre: </p>
    <div class="disciplinas-notas" id="listaDisciplinasNotas"></div>
    <div class="media-final-box">
      <h4>Média Final do Trimestre</h4>
      <div class="nota" id="mediaFinalTrimestre">0.0</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-success" id="btnImprimirBoletim"><i data-lucide="printer"></i> Imprimir Boletim</button>
      <button class="btn btn-secondary" onclick="fecharModal('modalNotas')">Fechar</button>
      <button class="btn btn-primary" id="btnSalvarNotas">Salvar Notas</button>
    </div>
  </div>
</div>

<!-- Modal Propina -->
<div class="modal-backdrop" id="modalPropina">
  <div class="modal">
    <h3 id="nomeAlunoPropina">Propinas</h3>
    <p style="color:var(--secondary-color);font-size:13px;margin:-8px 0 16px 0" id="anoLetivoPropina">Ano: </p>
    <div class="propina-grid" id="gridPropinas"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="fecharModal('modalPropina')">Fechar</button>
      <button class="btn btn-primary" id="btnSalvarPropina">Salvar</button>
    </div>
  </div>
</div>
 

<script type="module" src="estudantes.js"></script>
</body>
</html>
